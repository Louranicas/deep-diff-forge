version: 2
updates:
  # Keep Cargo dependencies patched (security updates land promptly).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # Keep third-party GitHub Actions current. Actions are referenced by tag in the
  # workflows for readability; Dependabot tracks upstream and proposes bumps so a
  # floating tag does not silently drift onto a compromised release.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
