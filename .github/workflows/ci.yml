name: ci

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

env:
  CARGO_TARGET_DIR: target
  CARGO_TERM_COLOR: always

jobs:
  gate:
    name: deploy gate-feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: format
        run: cargo fmt --all --check
      - name: compile
        run: cargo check --workspace --locked
      - name: lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: pedantic
        run: cargo clippy --workspace --all-targets -- -D warnings -W clippy::pedantic
      - name: test
        run: cargo test --workspace --locked
      - name: docs
        # Mirror the docs.rs build so a broken intra-doc link fails CI, not the
        # public docs page after publish.
        env:
          RUSTDOCFLAGS: -D warnings -D rustdoc::broken_intra_doc_links
        run: cargo doc --workspace --no-deps --locked
      - name: contracts
        run: |
          cargo run -p deep-diff-forge-cli -- --self-test
          cargo run -p deep-diff-forge-cli -- doctor
          cargo run -p deep-diff-forge-cli -- claude-code-contract
          cargo run -p deep-diff-forge-cli -- chain-contract
          cargo run -p deep-diff-forge-cli -- cluster-contract
          cargo run -p deep-diff-forge-cli -- loom-contract
      - name: deploy status
        run: cargo run -p deep-diff-forge-cli -- deploy status --json

  supply-chain:
    name: supply chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo-deny (bans, licenses, sources, advisories)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
      # cargo-deny v2 does not fail on `unsound` advisories by default, so run
      # cargo-audit as the strict advisory gate: it fails on any NEW advisory
      # while the two transitive, unreachable ones are explicitly accepted (and
      # documented in deny.toml). A bare `cargo audit` would also fail here.
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit (strict advisory gate)
        run: cargo audit --deny warnings --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2026-0002
