name: ci

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

env:
  CARGO_TARGET_DIR: target
  CARGO_TERM_COLOR: always

jobs:
  gate:
    name: deploy gate-feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - name: format
        run: cargo fmt --all --check
      - name: compile
        run: cargo check --workspace --locked
      - name: lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: pedantic
        run: cargo clippy --workspace --all-targets -- -D warnings -W clippy::pedantic
      - name: test
        run: cargo test --workspace --locked
      - name: docs
        # Mirror the docs.rs build so a broken intra-doc link fails CI, not the
        # public docs page after publish.
        env:
          RUSTDOCFLAGS: -D warnings -D rustdoc::broken_intra_doc_links
        run: cargo doc --workspace --no-deps --locked
      - name: contracts
        run: |
          cargo run -p deep-diff-forge-cli -- --self-test
          cargo run -p deep-diff-forge-cli -- doctor
          cargo run -p deep-diff-forge-cli -- claude-code-contract
          cargo run -p deep-diff-forge-cli -- chain-contract
          cargo run -p deep-diff-forge-cli -- cluster-contract
          cargo run -p deep-diff-forge-cli -- loom-contract
      - name: deploy status
        run: cargo run -p deep-diff-forge-cli -- deploy status --json
      - name: fuzz harness compile gate
        run: cargo check --manifest-path fuzz/Cargo.toml --bins
      - name: hostile daemon soak smoke
        env:
          DDF_SOAK_SECONDS: 10
        run: python3 scripts/security/daemon_soak.py
      - name: learning privacy probe
        run: python3 scripts/security/privacy_probe.py

  supply-chain:
    name: supply chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: cargo-deny (bans, licenses, sources, advisories)
        uses: EmbarkStudios/cargo-deny-action@8f84122a46a358a27cb0625d85ad60ab436a1b87 # v2
        with:
          command: check
      # cargo-deny v2 does not fail on `unsound` advisories by default, so run
      # cargo-audit as the strict advisory gate: it fails on any NEW advisory
      # while the two transitive, unreachable ones are explicitly accepted (and
      # documented in deny.toml). A bare `cargo audit` would also fail here.
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit (strict advisory gate)
        run: cargo audit --deny warnings --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2026-0002
      - name: SPDX SBOM gate (regenerate + verify against committed baseline)
        run: |
          python3 scripts/security/generate_spdx_sbom.py
          # Strip the timestamp-only field before comparing so a content-identical
          # SBOM that differs only in creation time still passes the gate.
          python3 - <<'EOF'
          import re, sys
          def strip_ts(text):
              # sbom.spdx.json is SPDX-JSON, not tag-value; "created" is a JSON string field.
              return re.sub(r'"created":\s*"[^"]*"', '"created": "<stripped>"', text)
          with open('sbom.spdx.json') as f:
              regen = f.read()
          import subprocess, os
          committed = subprocess.check_output(['git', 'show', 'HEAD:sbom.spdx.json'], text=True)
          if strip_ts(regen) != strip_ts(committed):
              print('SBOM DRIFT: regenerated SBOM differs from committed baseline.')
              print('Run: python3 scripts/security/generate_spdx_sbom.py && git add sbom.spdx.json')
              sys.exit(1)
          print('SBOM OK: content matches committed baseline (timestamp ignored).')
          EOF
