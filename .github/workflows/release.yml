name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Least privilege by default; the job that creates the GitHub Release elevates.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Supply-chain gate: a tag must not publish past a known advisory, a denied
  # license, or a yanked dependency. crates.io publication is irreversible, so
  # this is a hard prerequisite of every downstream job.
  supply-chain:
    name: supply chain gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@8f84122a46a358a27cb0625d85ad60ab436a1b87 # v2
        with:
          command: check
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit (strict advisory gate)
        run: cargo audit --deny warnings --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2026-0002

  build:
    name: build ${{ matrix.target }}
    needs: supply-chain
    permissions:
      contents: write # create the GitHub Release + upload assets
      attestations: write # GitHub Artifact Attestations / SLSA provenance
      id-token: write # OIDC token required by attest-build-provenance
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Unix-only: the daemon is built on Unix domain sockets, so the CLI does
        # not compile on Windows (the crate emits a clear compile_error there).
        # Targets are Linux + macOS to match the code's platform contract.
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: macos-latest, target: aarch64-apple-darwin }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - name: build release binary
        run: cargo build --release --locked -p deep-diff-forge-cli --target ${{ matrix.target }}
      - name: generate SPDX SBOM (single canonical release artifact)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: python3 scripts/security/generate_spdx_sbom.py
      - name: package
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          dist="deep-diff-forge-${TAG}-${TARGET}"
          mkdir -p "${dist}"
          cp "target/${TARGET}/release/deep-diff-forge" "${dist}/"
          cp README.md LICENSE-MIT LICENSE-APACHE "${dist}/"
          tar czf "${dist}.tar.gz" "${dist}"
          sha256sum "${dist}.tar.gz" > "${dist}.tar.gz.sha256"
      - name: attest release provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: |
            deep-diff-forge-*.tar.gz
            deep-diff-forge-*.tar.gz.sha256
      - name: attest SBOM provenance
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: sbom.spdx.json
      - name: upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            deep-diff-forge-*.tar.gz
            deep-diff-forge-*.tar.gz.sha256
      - name: upload release SBOM
        if: matrix.target == 'x86_64-unknown-linux-gnu' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: sbom.spdx.json

  publish:
    name: crates.io publish (token-gated)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: publish crates in dependency order if a token is configured
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -uo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN not set; skipping crates.io publish."
            exit 0
          fi
          # Idempotent + rate-limit-aware: skip crates already live at 0.2.0, and
          # retry crates.io's new-crate 429 limit (burst 5, then ~1/10min) until
          # each remaining crate lands. Lets a re-run finish a partial publish
          # without re-failing on already-published crates.
          for crate in core patch projection syntax pipeline graph agent tui cluster learning daemon cli; do
            name="deep-diff-forge-${crate}"
            attempt=0
            while true; do
              if curl -fsS "https://crates.io/api/v1/crates/${name}/0.2.0" >/dev/null 2>&1; then
                echo "OK ${name} 0.2.0 is live"; break
              fi
              attempt=$((attempt + 1))
              if [ "${attempt}" -gt 25 ]; then
                echo "::error::${name} still not published after ${attempt} attempts"; exit 1
              fi
              echo "publishing ${name} (attempt ${attempt})..."
              if cargo publish -p "${name}" --locked; then
                sleep 20
              else
                echo "  publish failed (likely 429 new-crate rate limit) - sleeping 90s"; sleep 90
              fi
            done
          done
          echo "all 12 crates published at 0.2.0"
