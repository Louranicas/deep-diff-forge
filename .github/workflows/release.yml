name: release

on:
  push:
    tags: ['v*']

# Least privilege by default; the job that creates the GitHub Release elevates.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Supply-chain gate: a tag must not publish past a known advisory, a denied
  # license, or a yanked dependency. crates.io publication is irreversible, so
  # this is a hard prerequisite of every downstream job.
  supply-chain:
    name: supply chain gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit (strict advisory gate)
        run: cargo audit --deny warnings --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2026-0002

  build:
    name: build ${{ matrix.target }}
    needs: supply-chain
    permissions:
      contents: write # create the GitHub Release + upload assets
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Unix-only: the daemon is built on Unix domain sockets, so the CLI does
        # not compile on Windows (the crate emits a clear compile_error there).
        # Targets are Linux + macOS to match the code's platform contract.
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: macos-latest, target: aarch64-apple-darwin }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: build release binary
        run: cargo build --release --locked -p deep-diff-forge-cli --target ${{ matrix.target }}
      - name: package
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          dist="deep-diff-forge-${TAG}-${TARGET}"
          mkdir -p "${dist}"
          cp "target/${TARGET}/release/deep-diff-forge" "${dist}/"
          cp README.md LICENSE-MIT LICENSE-APACHE "${dist}/"
          tar czf "${dist}.tar.gz" "${dist}"
          sha256sum "${dist}.tar.gz" > "${dist}.tar.gz.sha256"
      - name: upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deep-diff-forge-*.tar.gz
            deep-diff-forge-*.tar.gz.sha256

  publish:
    name: crates.io publish (token-gated)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: publish crates in dependency order if a token is configured
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN not set; skipping crates.io publish."
            exit 0
          fi
          for crate in core patch projection syntax pipeline graph agent tui cluster learning daemon cli; do
            cargo publish -p "deep-diff-forge-${crate}" --locked
            sleep 15
          done
