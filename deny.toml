# cargo-deny supply-chain policy (deployment framework gap analysis, P1).
# The workspace is dependency-free today; this policy guards future growth
# (the tree-sitter / TUI / async waves) before heavy deps arrive.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Permissive licenses compatible with this project's MIT OR Apache-2.0.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
