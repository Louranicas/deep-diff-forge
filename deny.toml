# cargo-deny supply-chain policy (deployment framework gap analysis, P1).
# The workspace is dependency-free today; this policy guards future growth
# (the tree-sitter / TUI / async waves) before heavy deps arrive.

[advisories]
version = 2
yanked = "deny"
unmaintained = "all"
ignore = [
  # paste 1.0.15 is unmaintained (RUSTSEC-2024-0436) — the author declared it
  # feature-complete, not vulnerable. Pulled transitively by ratatui (TUI wave).
  # Scoped accept; revisit when a maintained equivalent reaches the ratatui tree.
  "RUSTSEC-2024-0436",
]
# Note: lru 0.12.5 is unsound (RUSTSEC-2026-0002, `IterMut` Stacked Borrows,
# filed 2026-01-07), transitive via ratatui → lru. We never call lru's IterMut
# directly; whether ratatui does is ratatui's concern. cargo-deny does not surface
# this advisory class, so it is accepted in the cargo-audit CI gate only via
# `--ignore RUSTSEC-2026-0002`. Review gate: upgrade ratatui once a release ships
# that pulls a fixed lru (or replaces it), then drop the --ignore.
# Next mandatory review: 2026-09-01 (3-month window from S1009000 audit).

[licenses]
version = 2
# Permissive licenses compatible with this project's MIT OR Apache-2.0.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
